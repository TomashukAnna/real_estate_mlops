name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: flake8 src/api tests

      - name: Test
        run: pytest -q

      - name: Build Docker image
        run: docker build -t real-estate-api:ci .

      - name: Docker smoke (health endpoint)
        run: |
          docker run -d --name real-estate-api-smoke -p 8000:8000 real-estate-api:ci
          sleep 8
          curl --fail http://127.0.0.1:8000/health
          docker logs real-estate-api-smoke
          docker rm -f real-estate-api-smoke
